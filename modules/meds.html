<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuDherapy | Medication Log</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../js/brain.js"></script>
    <style>
        /* DYNAMIC GRID SCALING */
        .med-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        /* Filling gaps for odd numbers */
        .med-btn-container:last-child:nth-child(odd) {
            grid-column: span 2;
        }

        .med-btn-container { position: relative; }

        .med-btn {
            width: 100%;
            padding: 20px 10px;
            border: none;
            border-radius: 12px;
            font-size: 20px; /* High-Visibility Requirement */
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .last-taken-label {
            font-size: 11px;
            margin-top: 8px;
            opacity: 0.8;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Hover Tooltip (Info Tag) */
        .info-tag {
            visibility: hidden;
            width: 180px;
            background-color: #222;
            color: #fff;
            text-align: center;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            position: absolute;
            z-index: 10;
            bottom: 110%;
            left: 50%;
            margin-left: -90px;
            font-size: 13px;
            font-weight: normal;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .med-btn-container:hover .info-tag {
            visibility: visible;
            opacity: 1;
        }

        .del-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            z-index: 5;
        }

        .editing .del-btn { display: block; }

        .manage-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            border: 1px dashed #444;
        }
    </style>
</head>
<body onload="checkAuth(); renderMeds();">

    <div class="app-container">
        <h1 style="font-size: 34px; text-align: center; margin-bottom: 25px;">💊 Medication Log</h1>

        <h2 style="color: var(--morning-gold); font-size: 18px; margin-bottom: 10px;">📅 Timed Dosages (Sequential)</h2>
        <div id="timedGrid" class="med-grid"></div>

        <h2 style="color: #A78BFA; font-size: 18px; margin-bottom: 10px;">💉 Procedures & Shots</h2>
        <div id="procGrid" class="med-grid"></div>

        <div class="manage-card">
            <h3 style="margin-top: 0; color: var(--text-muted);">Manage Medications</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="toggleEdit()" id="editToggleBtn" style="flex:1; padding:10px; background:#444; color:white; border:none; border-radius:8px;">✎ EDIT / REMOVE</button>
            </div>
            
            <div id="addForm" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="newName" placeholder="Meds Name (e.g. B12 Shot)" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
                <input type="text" id="newInfo" placeholder="Dosage/Info (Hover Text)" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
                <select id="newCat" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
                    <option value="timed">Timed Dosage (Check Sequence)</option>
                    <option value="proc">Procedure / Shot (Independent)</option>
                </select>
                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-size:12px;">Color:</label>
                    <input type="color" id="newColor" value="#3498db" style="height:40px; border:none; background:none; flex:1;">
                    <button onclick="addNewMed()" style="padding:12px 20px; background:var(--text-green); color:black; font-weight:bold; border:none; border-radius:8px;">+ ADD</button>
                </div>
            </div>
        </div>

        <button onclick="window.location.href='../dashboard.html'" 
                style="width:100%; margin-top:30px; padding: 20px; border-radius: 12px; font-weight: bold; font-size: 20px; background:transparent; border:1px solid #444; color:#888;">
            🔙 BACK TO DASHBOARD
        </button>
    </div>

    <script>
        const defaults = [
            { label: "Morning", color: "#FFD700", info: "Morning pill rotation.", cat: "timed" },
            { label: "Evening", color: "#FF8C00", info: "Evening pill rotation.", cat: "timed" },
            { label: "Night", color: "#4A90E2", info: "Nightly medication.", cat: "timed" },
            { label: "Shot", color: "#A78BFA", info: "Weekly or scheduled injection.", cat: "proc" }
        ];

        let meds = JSON.parse(localStorage.getItem('customMeds')) || defaults;
        let isEditing = false;

        function renderMeds() {
            const tGrid = document.getElementById('timedGrid');
            const pGrid = document.getElementById('procGrid');
            const history = JSON.parse(localStorage.getItem('audherapy_db')) || [];

            tGrid.className = `med-grid ${isEditing ? 'editing' : ''}`;
            pGrid.className = `med-grid ${isEditing ? 'editing' : ''}`;

            tGrid.innerHTML = "";
            pGrid.innerHTML = "";

            meds.forEach((med, index) => {
                // BUG FIX: Removed '&& e.module === meds'. Now it just looks for the item name!
                const lastLog = [...history].reverse().find(e => e.item === med.label);
                const timeStr = lastLog ? `LAST: ${lastLog.time}` : "NOT LOGGED";
                
                const html = `
                    <div class="med-btn-container">
                        <span class="info-tag">${med.info}</span>
                        <button class="del-btn" onclick="removeMed(${index})">✕</button>
                        <button class="med-btn" 
                                style="background-color: ${med.color}; color: ${getContrastColor(med.color)};"
                                onclick="if(!isEditing) handleMedLog(${index})">
                            ${med.label}
                            <span class="last-taken-label">${timeStr}</span>
                        </button>
                    </div>`;

                if (med.cat === 'timed') tGrid.innerHTML += html;
                else pGrid.innerHTML += html;
            });
        }

       function handleMedLog(index) {
            const target = meds[index];
            const history = JSON.parse(localStorage.getItem('audherapy_db')) || [];
            
            // Get today's dates in multiple formats just to be safe
            const todayLocal = new Date().toLocaleDateString(); 
            const todayISO = new Date().toISOString().split('T')[0];

            // 1. SEQUENCE WARNING (Now checks for both 'timed' AND 'timeline' categories)
            if (target.cat === 'timed' || target.cat === 'timeline') {
                const timedMeds = meds.filter(m => m.cat === 'timed' || m.cat === 'timeline');
                const targetIdx = timedMeds.indexOf(target);

                for (let i = 0; i < targetIdx; i++) {
                    const prevMed = timedMeds[i];
                    
                    // Look through the history for a match today
                    const wasTakenToday = history.some(e => {
                        // Check if the log matches the button's exact label
                        const isRightMed = (e.item === prevMed.label || e.item === prevMed.item);
                        // Check if the log's date matches today (in either common format)
                        const isRightDate = (e.date === todayLocal || e.date === todayISO);
                        
                        return isRightMed && isRightDate;
                    });

                    // If it wasn't found, trigger the sequence alert
                    if (!wasTakenToday) {
                        const proceed = confirm(`⚠️ SEQUENCE ALERT\n\nYou haven't logged "${prevMed.label}" yet today.\n\nLog ${target.label} anyway?`);
                        if (!proceed) return; 
                    }
                }
            }

            // 2. LOGGING DATA
            const detail = (target.cat === 'proc' || target.cat === 'procedure') ? prompt("Details (e.g. Left Arm)?", "") : "";
            
            if (typeof window.log === 'function') {
                window.log('meds', target.label, 1, detail);
                
                setTimeout(() => {
                    renderMeds(); 
                    alert(`🐾🐾 SUCCESS 🐾🐾\nLogged: ${target.label}`);
                }, 100);

            } else {
                alert("Error: brain.js not found.");
            }
        }

        function addNewMed() {
            const name = document.getElementById('newName').value;
            const info = document.getElementById('newInfo').value;
            const color = document.getElementById('newColor').value;
            const cat = document.getElementById('newCat').value;

            if (!name) return alert("Please enter a name.");
            meds.push({ label: name, info: info || "No info.", color: color, cat: cat });
            saveAndRender();
            document.getElementById('newName').value = '';
            document.getElementById('newInfo').value = '';
        }

        function removeMed(index) {
            if (confirm(`Remove "${meds[index].label}"?`)) {
                meds.splice(index, 1);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('customMeds', JSON.stringify(meds));
            renderMeds();
        }

        function toggleEdit() {
            isEditing = !isEditing;
            const btn = document.getElementById('editToggleBtn');
            btn.innerText = isEditing ? "✔ FINISH EDITING" : "✎ EDIT / REMOVE";
            btn.style.background = isEditing ? "var(--text-green)" : "#444";
            btn.style.color = isEditing ? "black" : "white";
            renderMeds();
        }

        function getContrastColor(hex) {
            const r = parseInt(hex.substr(1,2), 16);
            const g = parseInt(hex.substr(3,2), 16);
            const b = parseInt(hex.substr(5,2), 16);
            const yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        function checkAuth() {
            if (sessionStorage.getItem('aud_auth') !== 'true') window.location.href = '../index.html';
        }
    </script>
</body>
</html>
