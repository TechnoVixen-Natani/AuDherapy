<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuDherapy | Crisis Tracker</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../js/brain.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000; color: white; margin: 0; padding: 0; font-family: sans-serif; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
        
        .card { background: #111; padding: 25px; border-radius: 12px; margin-bottom: 25px; border-left: 8px solid #ef4444; text-align: left; }
        
        .time-alert { background: #222; color: #ef4444; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 20px; border: 1px solid #ef4444; }

        .trigger-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .trigger-btn { padding: 15px; background: #222; border: 2px solid #444; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .trigger-active { background: #ef4444; border-color: #ef4444; color: black; }

        .input-box { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; margin-bottom: 15px; font-family: inherit; }
        textarea.input-box { min-height: 100px; resize: vertical; }
        .input-box::placeholder { color: #888; }

        /* Custom Toggle Switch for Meds */
        .toggle-container { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ef4444; }
        input:checked + .slider:before { transform: translateX(26px); }

        .save-btn { width: 100%; padding: 20px; background: #ef4444; color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .back-btn { width: 100%; padding: 20px; background: transparent; color: #888; border: 1px solid #444; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="initCrisisPage();">

    <div class="app-container">
        <h1 style="color: #ef4444; font-size: 38px; margin-bottom: 10px;">🚨 Meltdown Log</h1>
        
        <div id="timeSinceLast" class="time-alert">Calculating baseline...</div>

        <div class="card">
            <h3 style="margin-top: 0; color: white;">1. Time of Event</h3>
            <input type="datetime-local" id="eventTime" class="input-box">

            <h3 style="color: white; margin-top: 20px;">2. Primary Category</h3>
            <div class="trigger-grid" id="triggerGroup">
                <button class="trigger-btn" onclick="selectTrigger(this, 'Sensory Overload')">Sensory Overload</button>
                <button class="trigger-btn" onclick="selectTrigger(this, 'Routine Change')">Routine Change</button>
                <button class="trigger-btn" onclick="selectTrigger(this, 'Social Exhaustion')">Social Exhaustion</button>
                <button class="trigger-btn" onclick="selectTrigger(this, 'Task Demand')">Task Demand</button>
                <button class="trigger-btn" onclick="selectTrigger(this, 'Physical Pain')">Physical Pain</button>
                <button class="trigger-btn" onclick="selectTrigger(this, 'Other / Unknown')">Other / Unknown</button>
            </div>

            <h3 style="color: white; margin-top: 20px;">3. Variables & Context</h3>
            <div class="toggle-container">
                <span style="font-weight: bold; font-size: 16px;">Medication Issue / Factor?</span>
                <label class="switch">
                    <input type="checkbox" id="medsToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <textarea id="triggerInput" class="input-box" placeholder="Specific details (What set it off?)..."></textarea>
            <textarea id="recoveryInput" class="input-box" placeholder="What helped bring you out of it?..."></textarea>
        </div>

        <button class="save-btn" onclick="saveCrisis()">💾 LOG FORENSIC DATA</button>
        <button class="back-btn" onclick="window.location.href='../dashboard.html'">🏠 BACK TO DASHBOARD</button>
    </div>

    <script>
        let selectedCategory = "Uncategorized";

        function initCrisisPage() {
            if (sessionStorage.getItem('aud_auth') !== 'true') window.location.href = '../index.html';
            
            // Set datetime picker to right now
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('eventTime').value = now.toISOString().slice(0,16);

            // Calculate Time Since Last Meltdown
            const vault = JSON.parse(localStorage.getItem('audherapy_db') || '[]');
            const crisisLogs = vault.filter(l => l.category === 'Crisis').sort((a, b) => b.timestamp - a.timestamp);
            
            if (crisisLogs.length === 0) {
                document.getElementById('timeSinceLast').innerText = "FORENSIC BASELINE: No previous meltdowns logged.";
            } else {
                const diffMs = Date.now() - crisisLogs[0].timestamp;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                const diffHrs = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('timeSinceLast').innerText = `Time since last event: ${diffDays} Days, ${diffHrs} Hours`;
            }
        }

        function selectTrigger(btn, category) {
            document.querySelectorAll('.trigger-btn').forEach(b => b.classList.remove('trigger-active'));
            btn.classList.add('trigger-active');
            selectedCategory = category;
        }

        function saveCrisis() {
            const eventTime = document.getElementById('eventTime').value;
            const medsFactor = document.getElementById('medsToggle').checked ? "YES" : "NO";
            const triggerDesc = document.getElementById('triggerInput').value.trim() || "N/A";
            const recoveryDesc = document.getElementById('recoveryInput').value.trim() || "N/A";

            const forensicNote = `Time: ${eventTime.replace('T', ' ')} | Meds Factor: ${medsFactor} | Trigger Note: ${triggerDesc} | Recovery: ${recoveryDesc}`;

            if (typeof window.log === 'function') {
                // Category = Crisis, Item = The Primary Trigger, Value = 1 (Frequency count), Note = The compiled data
                window.log('Crisis', selectedCategory, 1, forensicNote);
                alert("🐾🐾 SUCCESS 🐾🐾\nCrisis logged securely into the vault.");
                window.location.href = '../dashboard.html';
            } else {
                alert("CRITICAL ERROR: brain.js not found.");
            }
        }
    </script>
</body>
</html>
