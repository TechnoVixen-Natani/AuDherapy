<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuDherapy | v5.3 Color-Coded Forensic</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f43e.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #09060B; --panel-purple: #1A1124; --accent-purple: #3A2350;
            --text-green: #00FF66; --text-muted: #A199AB; --danger-red: #FF3366;
            --morning-gold: #FFD700; --evening-orange: #FF8C00; --night-blue: #4A90E2; 
            --mood-color: #66CCCC; --state-pink: #FF66CC; --pain-orange: #FF8C00;
            --indica-purple: #A78BFA;
        }

        body { background-color: var(--bg-dark); color: var(--text-green); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; padding-bottom: 80px; }
        .card { background-color: var(--panel-purple); border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--accent-purple); }

        h1 { font-size: 28px; margin-bottom: 5px; color: var(--text-green); display: flex; justify-content: space-between; align-items: center; }
        h2 { font-size: 14px; margin-top: 0; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .grid-10 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 5px; }

        button { background-color: var(--accent-purple); color: var(--text-green); border: 1px solid var(--text-green); padding: 14px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .btn-mood { background: transparent; border: 1px solid var(--mood-color); color: var(--mood-color); font-size: 22px; padding: 18px 5px; }
        .btn-pain { background: transparent; border: 1px solid var(--pain-orange); color: var(--pain-orange); font-size: 16px; padding: 10px 2px; }
        
        .flex-btn-group { display: flex; gap: 5px; width: 100%; margin-bottom: 5px; }
        .main-btn { flex-grow: 1; font-size: 12px; border-color: inherit; color: inherit; }
        .btn-info { width: 35px; background: transparent; border-color: var(--text-muted); color: var(--text-muted); flex-shrink: 0; font-family: serif; }
        .btn-del { width: 35px; background: rgba(255, 51, 102, 0.1); border-color: var(--danger-red); color: var(--danger-red); flex-shrink: 0; }

        .quick-log-bar { background: #2d2d2d; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; border: 1px solid var(--morning-gold); }
        .quick-log-bar input { flex: 1; background: #1a1a1a; color: white; border: none; padding: 10px; border-radius: 5px; outline: none; }

        #pinScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pin-display { font-size: 30px; letter-spacing: 15px; margin-bottom: 30px; min-height: 40px; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .pin-btn { background: var(--panel-purple); border: 2px solid var(--accent-purple); width: 75px; height: 75px; border-radius: 50%; font-size: 24px; color: var(--text-green); }

        #toast { visibility: hidden; background: var(--text-green); color: #000; padding: 12px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); border-radius: 30px; z-index: 10000; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

    <div id="pinScreen">
        <h2 id="pinPrompt">ENTER PIN</h2>
        <div class="pin-display" id="pinInputDisplay"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="pressPin(1)">1</button><button class="pin-btn" onclick="pressPin(2)">2</button><button class="pin-btn" onclick="pressPin(3)">3</button>
            <button class="pin-btn" onclick="pressPin(4)">4</button><button class="pin-btn" onclick="pressPin(5)">5</button><button class="pin-btn" onclick="pressPin(6)">6</button>
            <button class="pin-btn" onclick="pressPin(7)">7</button><button class="pin-btn" onclick="pressPin(8)">8</button><button class="pin-btn" onclick="pressPin(9)">9</button>
            <button class="pin-btn" style="border:none; background:transparent;"></button><button class="pin-btn" onclick="pressPin(0)">0</button>
            <button class="pin-btn" style="border-color: var(--danger-red); color: var(--danger-red);" onclick="clearPinInput()">X</button>
        </div>
    </div>

    <div class="app-container" id="dashboard" style="display:none;">
        <h1 style="display:flex; justify-content:space-between;">
            AuDherapy 
            <div style="font-size: 20px; display: flex; gap: 15px;">
                <span id="editToggleBtn" onclick="toggleEditMode()">✏️</span>
                <span onclick="toggleView('analytics')">📊</span>
            </div>
        </h1>

        <div class="card" style="border-left-color: var(--mood-color);">
            <h2>Capacity & Pain</h2>
            <div class="grid-5">
                <button class="btn-mood" onclick="log('Mood', 'Capacity', 1)">1</button><button class="btn-mood" onclick="log('Mood', 'Capacity', 2)">2</button><button class="btn-mood" onclick="log('Mood', 'Capacity', 3)">3</button><button class="btn-mood" onclick="log('Mood', 'Capacity', 4)">4</button><button class="btn-mood" onclick="log('Mood', 'Capacity', 5)">5</button>
            </div>
            <div class="grid-10" style="margin-top:15px;">
                <button class="btn-pain" onclick="log('Pain', 'Level', 1)">1</button><button class="btn-pain" onclick="log('Pain', 'Level', 2)">2</button><button class="btn-pain" onclick="log('Pain', 'Level', 3)">3</button><button class="btn-pain" onclick="log('Pain', 'Level', 4)">4</button><button class="btn-pain" onclick="log('Pain', 'Level', 5)">5</button><button class="btn-pain" onclick="log('Pain', 'Level', 6)">6</button><button class="btn-pain" onclick="log('Pain', 'Level', 7)">7</button><button class="btn-pain" onclick="log('Pain', 'Level', 8)">8</button><button class="btn-pain" onclick="log('Pain', 'Level', 9)">9</button><button class="btn-pain" onclick="log('Pain', 'Level', 10)">10</button>
            </div>
        </div>

        <div class="card" style="border-left-color: var(--morning-gold);">
            <h2>Meds Quick-Log</h2>
            <div class="quick-log-bar">
                <input type="text" id="quickMedInput" placeholder="Quick log med...">
                <button onclick="logQuickEntry()" style="background:var(--morning-gold); color:#000; border:none; padding:0 15px;">➕</button>
            </div>
            <div class="grid-2" id="medsGrid"></div>
        </div>

        <div class="card" style="border-left-color: var(--state-pink);"><h2>System State</h2><div class="grid-2" id="stateGrid"></div></div>
        <div class="card" style="border-left-color: var(--night-blue);"><h2>Sensory Log</h2><div class="grid-2" id="sensoryGrid"></div></div>
        <div class="card" style="border-left-color: var(--text-green);"><h2>Maintenance</h2><div class="grid-2" id="maintenanceGrid"></div></div>
        
        <button style="width:100%; background:var(--danger-red); color:white; padding:20px; border:none; border-radius:12px; font-weight:bold; font-size:18px;" onclick="log('Crisis', 'Emergency Call/Meltdown')">🚨 EMERGENCY</button>
    </div>

    <div class="app-container" id="analytics" style="display:none;">
        <h1>Analytics</h1>
        <div class="card"><h2>Daily States</h2><canvas id="stateChart"></canvas></div>
        <button onclick="toggleView('dashboard')" style="width:100%;">🔙 BACK</button>
    </div>

    <div id="toast">Logged!</div>

    <script>
        let db = JSON.parse(localStorage.getItem('audherapy_db')) || [];
        let savedPin = localStorage.getItem('userMasterPin');
        let currentPinInput = "";
        let editMode = false;
        let charts = {};

        const defaultConfigs = {
            maintenance: [
                {label: '💧 Water', item: 'Water', color: 'var(--text-green)'}, 
                {label: '🪥 Teeth', item: 'Teeth', color: 'var(--text-green)'}
            ],
            state: [
                {label: '🌀 Flow', item: 'Flow', color: 'var(--state-pink)'}, 
                {label: '⚪ Neutral', item: 'Neutral', color: 'var(--state-pink)'},
                {label: '🚧 Exec Dys', item: 'Exec Dys', color: 'var(--state-pink)'}
            ],
            sensory: [
                {label: '🔊 Noise', item: 'Noise', color: 'var(--night-blue)'}, 
                {label: '🔆 Light', item: 'Light', color: 'var(--night-blue)'}
            ],
            meds: [
                {label: '🌅 Morning', item: 'Morning', color: 'var(--morning-gold)'}, 
                {label: '🌇 Evening', item: 'Evening', color: 'var(--evening-orange)'},
                {label: '🌃 Night', item: 'Night', color: 'var(--night-blue)'},
                {label: '😶‍🌫️ Indica', item: 'Indica', color: 'var(--indica-purple)'}
            ]
        };
        let appConfig = JSON.parse(localStorage.getItem('audherapy_config')) || defaultConfigs;

        window.onload = () => {
            if(!savedPin) document.getElementById('pinPrompt').innerText = "CREATE PIN";
            renderAllGrids();
        };

        function pressPin(n) {
            if(currentPinInput.length < 4) {
                currentPinInput += n;
                document.getElementById('pinInputDisplay').innerText = "* ".repeat(currentPinInput.length);
            }
            if(currentPinInput.length === 4) {
                if(!savedPin) { localStorage.setItem('userMasterPin', currentPinInput); location.reload(); }
                else if(currentPinInput === savedPin) { document.getElementById('pinScreen').style.display='none'; document.getElementById('dashboard').style.display='block'; }
                else { document.getElementById('pinInputDisplay').innerText="ERROR"; setTimeout(clearPinInput, 1000); }
            }
        }
        function clearPinInput() { currentPinInput = ""; document.getElementById('pinInputDisplay').innerText = ""; }

        function log(cat, item, val = null, note = "") {
            db.push({ timestamp: Date.now(), date: new Date().toLocaleDateString(), category: cat, item: item, value: val, note: note });
            localStorage.setItem('audherapy_db', JSON.stringify(db));
            showToast("Logged!");
        }

        function logQuickEntry() {
            const v = document.getElementById('quickMedInput').value;
            if(!v) return;
            log('Meds', 'Quick Entry', null, v);
            document.getElementById('quickMedInput').value = "";
        }

        function renderAllGrids() {
            renderGrid('maintenance', 'maintenanceGrid');
            renderGrid('state', 'stateGrid');
            renderGrid('sensory', 'sensoryGrid');
            renderGrid('meds', 'medsGrid');
        }

        function renderGrid(sec, id) {
            const g = document.getElementById(id);
            g.innerHTML = appConfig[sec].map((b, i) => `
                <div class="flex-btn-group" style="color: ${b.color || 'var(--text-green)'}; border-color: ${b.color || 'var(--text-green)'};">
                    ${editMode ? `<button class="btn-del" onclick="deleteBtn('${sec}', ${i})">❌</button>` : ''}
                    <button class="main-btn" onclick="log('${sec}', '${b.item}')">${b.label}</button>
                    ${b.desc ? `<button class="btn-info" onclick="alert('${b.desc}')">i</button>` : ''}
                </div>
            `).join('') + (editMode ? `<button style="grid-column: span 2; color:white; border-color:white;" onclick="addBtn('${sec}')">+ ADD ITEM</button>` : '');
        }

        function addBtn(sec) {
            const l = prompt("Label (e.g. 💊 Vyvanse):"); 
            const i = prompt("Short ID (for stats):"); 
            const d = prompt("Literal Definition (optional):");
            const c = prompt("Hex Color (optional, e.g. #FF0000):");
            if(l && i) { 
                appConfig[sec].push({label: l, item: i, desc: d, color: c}); 
                localStorage.setItem('audherapy_config', JSON.stringify(appConfig)); 
                renderAllGrids(); 
            }
        }
        function deleteBtn(sec, i) { if(confirm("Delete?")) { appConfig[sec].splice(i, 1); localStorage.setItem('audherapy_config', JSON.stringify(appConfig)); renderAllGrids(); } }
        function toggleEditMode() { editMode = !editMode; document.getElementById('editToggleBtn').style.color = editMode ? 'var(--danger-red)' : 'var(--text-muted)'; renderAllGrids(); }
        function toggleView(v) { document.getElementById('dashboard').style.display = v==='dashboard'?'block':'none'; document.getElementById('analytics').style.display = v==='analytics'?'block':'none'; if(v==='analytics') drawCharts(); }
        function drawCharts() {
            const d = {}; db.filter(x => x.date === new Date().toLocaleDateString() && x.category === 'state').forEach(x => d[x.item] = (d[x.item] || 0) + 1);
            if(charts['stateChart']) charts['stateChart'].destroy();
            charts['stateChart'] = new Chart(document.getElementById('stateChart'), { type: 'pie', data: { labels: Object.keys(d), datasets: [{ data: Object.values(d), backgroundColor: ['#FF66CC', '#00FF66', '#4A90E2', '#FFD700'] }] }});
        }
        function showToast(m) { const t = document.getElementById("toast"); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }
        document.addEventListener("visibilitychange", () => { if(document.visibilityState === 'hidden' && savedPin) location.reload(); });
    </script>
</body>
</html>
