<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuDherapy | v4.9 Optimized</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f43e.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #09060B; --panel-purple: #1A1124; --accent-purple: #3A2350;
            --text-green: #00FF66; --text-muted: #A199AB; --danger-red: #FF3366;
            --morning-gold: #FFD700; --night-blue: #4A90E2; --mood-color: #66CCCC;
            --state-pink: #FF66CC; --pain-orange: #FF8C00;
        }

        body { background-color: var(--bg-dark); color: var(--text-green); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 450px; padding-bottom: 80px; }
        .card { background-color: var(--panel-purple); border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--accent-purple); }

        h1 { font-size: 28px; margin-bottom: 5px; color: var(--text-green); display: flex; justify-content: space-between; align-items: center; }
        h2 { font-size: 14px; margin-top: 0; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        
        .streak-container { background: rgba(0, 255, 102, 0.1); border: 1px solid var(--text-green); padding: 12px; border-radius: 8px; margin-bottom: 25px; text-align: center; font-family: monospace; font-size: 14px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }

        button { background-color: var(--accent-purple); color: var(--text-green); border: 1px solid var(--text-green); padding: 16px 5px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        button:active { background-color: var(--text-green); color: var(--bg-dark); }

        .btn-meltdown { width: 100%; background-color: var(--danger-red); color: white; border: none; margin-top: 15px; font-size: 20px; padding: 22px; text-transform: uppercase; border-radius: 12px; }

        /* PIN PAD STYLING */
        #pinScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .pin-display { font-size: 30px; letter-spacing: 15px; margin-bottom: 30px; color: var(--text-green); min-height: 40px;}
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 280px; }
        .pin-btn { background: var(--panel-purple); border: 2px solid var(--accent-purple); font-size: 24px; padding: 20px; border-radius: 50%; color: var(--text-green); width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; }

        .quick-log-bar { background: #2d2d2d; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; border: 1px solid var(--morning-gold); }
        .quick-log-bar input { flex: 1; background: #1a1a1a; color: white; border: none; padding: 10px; border-radius: 5px; outline: none; }

        canvas { max-height: 220px; margin-bottom: 40px; }
        #toast { visibility: hidden; min-width: 250px; background: var(--text-green); color: var(--bg-dark); text-align: center; border-radius: 30px; padding: 12px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="pinScreen">
        <h2 id="pinPrompt" style="color: var(--text-green);">ENTER PIN</h2>
        <div class="pin-display" id="pinInputDisplay"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="pressPin(1)">1</button>
            <button class="pin-btn" onclick="pressPin(2)">2</button>
            <button class="pin-btn" onclick="pressPin(3)">3</button>
            <button class="pin-btn" onclick="pressPin(4)">4</button>
            <button class="pin-btn" onclick="pressPin(5)">5</button>
            <button class="pin-btn" onclick="pressPin(6)">6</button>
            <button class="pin-btn" onclick="pressPin(7)">7</button>
            <button class="pin-btn" onclick="pressPin(8)">8</button>
            <button class="pin-btn" onclick="pressPin(9)">9</button>
            <button class="pin-btn" style="border:none; background:transparent;"></button>
            <button class="pin-btn" onclick="pressPin(0)">0</button>
            <button class="pin-btn" style="border-color: var(--danger-red); color: var(--danger-red);" onclick="clearPinInput()">X</button>
        </div>
    </div>

    <div class="app-container" id="dashboard" style="display:none;">
        <h1>AuDherapy <span onclick="toggleView('settings')" style="font-size: 20px;">⚙️</span></h1>
        <div class="streak-container" id="stabilityStreak">STREAK: CALCULATING...</div>

        <div class="card" style="border-left-color: var(--state-pink);">
            <h2>System State</h2>
            <div class="grid-2" id="stateGrid"></div>
        </div>

        <div class="card" style="border-left-color: var(--morning-gold);">
            <h2>Medication Quick-Log</h2>
            <div class="quick-log-bar">
                <input type="text" id="quickMedInput" placeholder="Advil, Gummy, etc...">
                <button onclick="logQuickEntry()" style="background: var(--morning-gold); color: #000; border: none; padding: 0 15px;">➕</button>
            </div>
            <div class="grid-2" id="medsGrid"></div>
        </div>

        <button class="btn-meltdown" onclick="alert('Crisis Logged')">⚠️ EMERGENCY</button>
        <button class="btn-meltdown" style="background: var(--night-blue);" onclick="toggleView('analytics')">📊 VIEW TRENDS</button>
    </div>

    <div class="app-container" id="analytics" style="display:none;">
        <h1>ANALYTICS</h1>
        <div class="card">
            <h2>Daily System States</h2>
            <canvas id="stateChart"></canvas>
            
            <h2>Medication Compliance</h2>
            <canvas id="medChart"></canvas>
        </div>
        <button class="btn-meltdown" onclick="toggleView('dashboard')">🔙 BACK</button>
    </div>

    <div id="toast">Logged!</div>

    <script>
        let db = JSON.parse(localStorage.getItem('audherapy_db')) || [];
        let savedPin = localStorage.getItem('userMasterPin');
        let currentPinInput = "";
        let charts = {};

        // INITIALIZE
        window.onload = function() {
            if (!savedPin) {
                document.getElementById('pinPrompt').innerText = "CREATE MASTER PIN";
            }
            renderGrids();
            updateStreak();
        };

        // PIN PAD LOGIC
        function pressPin(num) {
            if (currentPinInput.length < 4) {
                currentPinInput += num;
                document.getElementById('pinInputDisplay').innerText = "* ".repeat(currentPinInput.length);
            }
            if (currentPinInput.length === 4) {
                if (!savedPin) {
                    localStorage.setItem('userMasterPin', currentPinInput);
                    savedPin = currentPinInput;
                    alert("PIN Set Successfully!");
                    location.reload();
                } else if (currentPinInput === savedPin) {
                    document.getElementById('pinScreen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                } else {
                    document.getElementById('pinInputDisplay').innerText = "ERROR";
                    setTimeout(clearPinInput, 1000);
                }
            }
        }

        function clearPinInput() {
            currentPinInput = "";
            document.getElementById('pinInputDisplay').innerText = "";
        }

        // LOGGING
        function log(cat, item, val = null, note = "") {
            db.push({ timestamp: Date.now(), date: new Date().toLocaleDateString(), category: cat, item: item, note: note });
            localStorage.setItem('audherapy_db', JSON.stringify(db));
            showToast("Logged!");
            updateStreak();
        }

        function logQuickEntry() {
            const val = document.getElementById('quickMedInput').value;
            if (!val) return;
            log('Meds', 'Quick Entry', null, val);
            document.getElementById('quickMedInput').value = "";
        }

        function renderGrids() {
            const states = ['Flow State', 'Neutral', 'Exec Dysfunc', 'Inner Unrest'];
            document.getElementById('stateGrid').innerHTML = states.map(s => `<button onclick="log('State', '${s}')">${s}</button>`).join('');
            
            const meds = ['Morning Meds', 'Evening Meds', 'Night Meds', 'Indica Gummy'];
            document.getElementById('medsGrid').innerHTML = meds.map(m => `<button style="border-color: var(--morning-gold);" onclick="log('Meds', '${m}')">${m}</button>`).join('');
        }

        function updateStreak() {
            const streakEl = document.getElementById('stabilityStreak');
            streakEl.innerText = "STABILITY STREAK: ACTIVE";
        }

        function toggleView(view) {
            document.getElementById('dashboard').style.display = view === 'dashboard' ? 'block' : 'none';
            document.getElementById('analytics').style.display = view === 'analytics' ? 'block' : 'none';
            if (view === 'analytics') drawCharts();
        }

        function drawCharts() {
            const today = new Date().toLocaleDateString();
            const todayLogs = db.filter(l => l.date === today);

            // Dynamic State Pie Chart
            const stateData = {};
            todayLogs.filter(l => l.category === 'State').forEach(l => stateData[l.item] = (stateData[l.item] || 0) + 1);
            
            renderChart('stateChart', 'pie', Object.keys(stateData), Object.values(stateData), ['#FF66CC', '#00FF66', '#4A90E2', '#FFD700']);
        }

        function renderChart(id, type, labels, data, colors) {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type: type,
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors }] },
                options: { plugins: { legend: { labels: { color: '#fff' } } } }
            });
        }

        function showToast(m) {
            const t = document.getElementById("toast");
            t.innerText = m; t.className = "show";
            setTimeout(() => t.className = "", 3000);
        }

        // PWA AUTO LOCK
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'hidden') location.reload();
        });
    </script>
</body>
</html>
