<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuDherapy | Gate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pinScreen">
        <h2 id="pinPrompt">ENTER MASTER PIN</h2>
        <div class="pin-display" id="pinInputDisplay"></div>
        <div class="pin-pad" id="pad"></div>
    </div>

    <script>
        const savedPin = localStorage.getItem('userMasterPin');
        let currentInput = "";
        if (!savedPin) document.getElementById('pinPrompt').innerText = "CREATE MASTER PIN";

       function pressPin(n) {
    currentInput += n;
    document.getElementById('pinInputDisplay').innerText = "* ".repeat(currentInput.length);
    
    if (currentInput.length === 4) {
        if (!savedPin) {
            localStorage.setItem('userMasterPin', currentInput);
            sessionStorage.setItem('aud_auth', 'true'); // Set auth for initial setup too
            window.location.href = 'dashboard.html';
        } else if (currentInput === savedPin) {
            sessionStorage.setItem('aud_auth', 'true'); // The "Hall Pass"
            window.location.href = 'dashboard.html';
        } else {
            currentInput = "";
            document.getElementById('pinInputDisplay').innerText = "ERROR";
            setTimeout(() => { document.getElementById('pinInputDisplay').innerText = ""; }, 1000);
        }
    }
}

        // Render Pad
        // Render Pad
        const pad = document.getElementById('pad');
        
        // 1. Create buttons 1-9
        for (let i = 1; i <= 9; i++) {
            pad.innerHTML += `<button class="pin-btn" onclick="pressPin(${i})">${i}</button>`;
        }
        
        // 2. Add the Bottom Row: [Empty Space] [0] [Red X]
        pad.innerHTML += `<div></div>`; // Spacer for grid alignment
        pad.innerHTML += `<button class="pin-btn" onclick="pressPin(0)">0</button>`;
        pad.innerHTML += `<button class="pin-btn clear" onclick="clearPin()">X</button>`;

        // 3. The Logic Functions
        function clearPin() {
            currentInput = "";
            document.getElementById('pinInputDisplay').innerText = "";
        }
    </script>
</body>
</html>
