<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuDherapy | Analytics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/brain.js"></script>
    <script src="js/stateAnalytics.js"></script>
</head>
<body>

    <div class="app-container" id="analytics">
        <h1>Forensic Trends</h1>
        
        <div class="time-filters" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
            <button class="filter-btn filter-active" id="btn1" onclick="setFilter(1)">Daily</button>
            <button class="filter-btn" id="btn7" onclick="setFilter(7)">Weekly</button>
            <button class="filter-btn" id="btn30" onclick="setFilter(30)">Monthly</button>
        </div>
        
        <div class="card" style="text-align: left; padding: 20px; border-left-color: var(--text-green);">
            <h2 style="margin-top: 0; margin-bottom: 20px;">💧 Maintenance Progress</h2>

            <div id="dailyMaintenanceBars">
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 4px; font-weight: bold;">
                    <span>0</span><span>8</span><span>16</span><span>24</span><span>32</span><span>40</span><span>48</span><span>56</span><span>64oz</span>
                </div>
                <div style="width: 100%; background: #111; height: 28px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #333; overflow: hidden;">
                    <div id="waterBar" style="height: 100%; width: 0%; background: var(--text-green); transition: width 0.8s ease-out;"></div>
                </div>
                <div style="width: 100%; background: #111; height: 28px; border-radius: 6px; margin-bottom: 4px; border: 1px solid #333; overflow: hidden;">
                    <div id="teethBar" style="height: 100%; width: 0%; background: #A78BFA; transition: width 0.8s ease-out;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: #888; font-weight: bold;">
                    <span>0</span><span>1</span>
                </div>
            </div>

            <canvas id="maintenanceChart" style="display: none;"></canvas>
        </div>

        <div class="card"><h2>Weight History</h2><canvas id="weightChart"></canvas></div>
        <div class="card"><h2>Shot Tracker</h2><canvas id="shotChart"></canvas></div>
        <div class="card"><h2>Meltdown Frequency</h2><canvas id="crisisChart"></canvas></div>
        <div class="card"><h2>Pain History</h2><canvas id="painChart"></canvas></div>
        <div class="card"><h2>Med Compliance</h2><canvas id="medChart"></canvas></div>
        
        <button onclick="prepareReport()" id="reportBtn" style="width:100%; background:var(--morning-gold); color:black; margin-bottom:10px; padding:15px; font-weight:bold; border-radius:12px;">📊 GENERATE MASTER REPORT</button>
        <button onclick="window.location.href='dashboard.html'" style="width:100%; padding:15px; background:transparent; border:1px solid #444; color:#888; border-radius:12px;">🔙 BACK TO DASHBOARD</button>
    </div>

    <div id="printModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; color:#000; z-index:20000; overflow-y:scroll; padding:20px;">
        <div class="no-print" style="display:flex; gap:10px; margin-bottom:20px;">
            <button onclick="window.print()" style="flex:2; background:var(--text-green); padding:15px; font-weight:bold;">✅ OPEN PRINT DIALOG</button>
            <button onclick="document.getElementById('printModal').style.display='none'" style="flex:1; padding:15px;">CANCEL</button>
        </div>
        <div id="printOutput"></div>
    </div>

    <script>
        let charts = {};
        let activeFilter = 1; 

        function setFilter(f) {
            activeFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-active'));
            document.getElementById('btn'+f).classList.add('filter-active');
            drawCharts();
        }

        function loadDailyMaintenanceBars(history) {
            const todayLocal = new Date().toLocaleDateString();
            const todayISO = new Date().toISOString().split('T')[0];
            const now = new Date();

            let waterOunces = 0;
            let teethBrushed = 0;

            history.forEach(log => {
                let isToday = false;
                if (log.date === todayLocal || log.date === todayISO) isToday = true;
                try {
                    const logD = new Date(log.date);
                    if (logD.getDate() === now.getDate() && logD.getMonth() === now.getMonth() && logD.getFullYear() === now.getFullYear()) isToday = true;
                } catch(e) {}

                if (isToday) {
                    const item = (log.item || "").toLowerCase();
                    if (item.includes('water')) {
                        let val = String(log.value).replace(/[^0-9]/g, '');
                        if (val) waterOunces += parseInt(val);
                    } 
                    if (item.includes('oral hygiene') || item.includes('brush') || item.includes('teeth')) {
                        teethBrushed = 1;
                    }
                }
            });

            const waterPercent = Math.min((waterOunces / 64) * 100, 100);
            const teethPercent = teethBrushed > 0 ? 100 : 0;

            // THE FIX: Added a 150ms delay so the browser paints 0% first, forcing the smooth animation
            setTimeout(() => {
                const wb = document.getElementById('waterBar');
                const tb = document.getElementById('teethBar');
                if (wb) wb.style.width = waterPercent + '%';
                if (tb) tb.style.width = teethPercent + '%';
            }, 150);
        }

        function prepareMaintenanceChartData(logs, days) {
            const labels = [];
            const waterData = [];
            const teethData = [];
            const now = new Date();

            for (let i = days - 1; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                const dStr = d.toLocaleDateString();
                labels.push(dStr);

                let dWater = 0;
                let dTeeth = 0;

                logs.forEach(log => {
                    let isThisDay = false;
                    try {
                        const logD = new Date(log.date);
                        if (logD.getDate() === d.getDate() && logD.getMonth() === d.getMonth() && logD.getFullYear() === d.getFullYear()) isThisDay = true;
                    } catch(e) {}

                    if (isThisDay) {
                        const item = (log.item || "").toLowerCase();
                        if (item.includes('water')) {
                            let val = String(log.value).replace(/[^0-9]/g, '');
                            if (val) dWater += parseInt(val);
                        }
                        if (item.includes('oral hygiene') || item.includes('brush') || item.includes('teeth')) {
                            dTeeth = 1;
                        }
                    }
                });
                waterData.push(dWater);
                teethData.push(dTeeth);
            }
            return { labels, waterData, teethData };
        }

        function drawCharts(targetIdSuffix = "", timePeriod = null) {
            const filter = timePeriod || activeFilter;
            const cutoff = Date.now() - (filter * 864e5);
            const db = window.db || JSON.parse(localStorage.getItem('audherapy_db')) || [];
            const filtered = db.filter(x => x.timestamp >= cutoff);
            const isPrinting = targetIdSuffix !== "";

            const maintBars = document.getElementById('dailyMaintenanceBars');
            const maintCanvas = document.getElementById('maintenanceChart' + targetIdSuffix);

            if (filter === 1 && !isPrinting) {
                if (maintBars) maintBars.style.display = 'block';
                if (maintCanvas) maintCanvas.style.display = 'none';
                loadDailyMaintenanceBars(db);
            } else {
                if (maintBars) maintBars.style.display = 'none';
                if (maintCanvas) maintCanvas.style.display = 'block';
                
                const mData = prepareMaintenanceChartData(db, filter);
                renderDualAxisChart('maintenanceChart' + targetIdSuffix, mData.labels, mData.waterData, mData.teethData, isPrinting, filter);
            }

            const wLogs = filtered.filter(x => x.item === 'Weight').slice(-15);
            renderChart('weightChart' + targetIdSuffix, 'line', wLogs.map(w => w.date), wLogs.map(w => w.value), '#FFD700', false, isPrinting);

            const sLogs = filtered.filter(x => x.item === 'Shot');
            renderChart('shotChart' + targetIdSuffix, 'bar', sLogs.map(s => s.date), sLogs.map(s => s.value || 1), '#A78BFA', false, isPrinting);

            const cLogs = db.filter(x => x.category === 'Crisis' && x.timestamp >= cutoff);
            const cData = prepareTimeData(cLogs, filter);
            renderChart('crisisChart' + targetIdSuffix, 'line', cData.labels, cData.counts, '#FF3366', false, isPrinting);

            const pLogs = filtered.filter(x => x.category === 'Pain').slice(-15);
            renderChart('painChart' + targetIdSuffix, 'line', pLogs.map(p => p.time), pLogs.map(p => p.value), '#FF8C00', false, isPrinting);

            const medLabels = ['Morning', 'Evening', 'Night'];
            const medActual = medLabels.map(slot => filtered.filter(entry => entry.category === 'meds' && entry.item === slot).length);
            const medExpected = medLabels.map(slot => filter);
            renderMedChart('medChart' + targetIdSuffix, medLabels, medActual, medExpected, isPrinting);
        }

        function prepareTimeData(logs, days) {
            const labels = []; const counts = []; const now = new Date();
            if (days === 1) { 
                for (let i = 0; i < 24; i++) { 
                    labels.push(i + ":00"); 
                    counts.push(logs.filter(l => new Date(l.timestamp).getHours() === i).length); 
                }
            } else { 
                for (let i = days - 1; i >= 0; i--) { 
                    const d = new Date(now); d.setDate(d.getDate() - i); 
                    const dStr = d.toLocaleDateString(); 
                    labels.push(dStr); 
                    counts.push(logs.filter(l => l.date === dStr).length); 
                } 
            }
            return { labels, counts };
        }

        function renderChart(id, type, labels, data, colors, horiz = false, isPrinting = false) {
            const ctx = document.getElementById(id); if (!ctx) return;
            if (charts[id]) charts[id].destroy();
            let yAxisConfig = { ticks: { color: isPrinting ? '#000' : '#fff' }, beginAtZero: true };
            if (id.includes('weightChart') && data.length > 0) {
                const minVal = Math.min(...data); 
                yAxisConfig.beginAtZero = false;
                yAxisConfig.suggestedMin = Math.floor(minVal / 5) * 5 - 5;
            }
            charts[id] = new Chart(ctx, {
                type, data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: colors, fill: false, tension: 0.1, pointRadius: 4 }] },
                options: { 
                    animation: false, responsive: false, devicePixelRatio: 2, indexAxis: horiz ? 'y' : 'x', 
                    plugins: { legend: { display: type === 'pie', labels: { color: isPrinting ? '#000' : '#fff' } } }, 
                    scales: { x: { ticks: { color: isPrinting ? '#000' : '#fff' } }, y: yAxisConfig } 
                }
            });
        }

        function renderDualAxisChart(id, labels, waterData, teethData, isPrinting, days) {
            const ctx = document.getElementById(id); if (!ctx) return;
            if (charts[id]) charts[id].destroy();

            const chartType = (days === 1) ? 'bar' : 'line';

            charts[id] = new Chart(ctx, {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Water (oz)', data: waterData, borderColor: '#3498db', backgroundColor: '#3498db', yAxisID: 'y', tension: 0.1 },
                        { label: 'Teeth (0/1)', data: teethData, borderColor: '#A78BFA', backgroundColor: '#A78BFA', yAxisID: 'y1', stepped: true }
                    ]
                },
                options: {
                    animation: false, responsive: false, devicePixelRatio: 2,
                    scales: {
                        x: { ticks: { color: isPrinting ? '#000' : '#fff' } },
                        y: { type: 'linear', position: 'left', suggestedMax: 64, ticks: { color: isPrinting ? '#000' : '#fff' } },
                        y1: { type: 'linear', position: 'right', suggestedMax: 1, ticks: { stepSize: 1, color: isPrinting ? '#000' : '#fff' }, grid: { drawOnChartArea: false } }
                    },
                    plugins: { legend: { labels: { color: isPrinting ? '#000' : '#fff' } } }
                }
            });
        }

        function renderMedChart(id, labels, actual, expected, isPrinting) {
            const ctx = document.getElementById(id); if (!ctx) return;
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [
                    { label: 'Logged', data: actual, backgroundColor: '#00FF66' },
                    { label: 'Expected', data: expected, backgroundColor: 'rgba(255, 255, 255, 0.1)', borderColor: '#A199AB', borderWidth: 1 }
                ]},
                options: { 
                    responsive: false,
                    scales: { 
                        x: { ticks: { color: isPrinting ? '#000' : '#fff' } }, 
                        y: { beginAtZero: true, ticks: { stepSize: 1, color: isPrinting ? '#000' : '#fff' } } 
                    },
                    plugins: { legend: { labels: { color: isPrinting ? '#000' : '#fff' } } }
                }
            });
        }

        function prepareReport() {
            const out = document.getElementById('printOutput'); const btn = document.getElementById('reportBtn');
            btn.innerText = "Snapshotted Forensic Data..."; out.innerHTML = "";
            const periods = [{n: 1, l: "Daily"}, {n: 7, l: "Weekly"}, {n: 30, l: "Monthly"}];
            const categories = [['maintenanceChart', 'Maintenance Progress'], ['weightChart', 'Weight History'], ['shotChart', 'Shot Tracker'], ['crisisChart', 'Meltdown Frequency'], ['painChart', 'Pain History'], ['medChart', 'Medication Compliance']];

            periods.forEach(p => {
                const section = document.createElement('div'); section.className = "print-card";
                section.innerHTML = `<h2>${p.l} Forensic Insight</h2>`;
                categories.forEach(cat => {
                    const canvasId = `${cat[0]}_p${p.n}`;
                    section.innerHTML += `<h3>${cat[1]}</h3><canvas id="${canvasId}" width="800" height="400" style="display:none;"></canvas><img id="img_${canvasId}" style="display:block; width:100%;">`;
                });
                out.appendChild(section);
            });

            setTimeout(() => {
                periods.forEach(p => drawCharts('_p' + p.n, p.n));
                setTimeout(() => {
                    document.querySelectorAll('#printOutput canvas').forEach(canv => {
                        const img = document.getElementById('img_' + canv.id);
                        img.src = canv.toDataURL("image/png");
                        canv.remove();
                    });
                    document.getElementById('printModal').style.display = 'block';
                    btn.innerText = "📊 GENERATE MASTER REPORT";
                }, 1200);
            }, 500);
        }

        // THE FIX: The Indestructible Event Listener
        window.addEventListener('DOMContentLoaded', () => {
            
            setTimeout(() => {
                drawCharts();
            }, 100);
        });
    </script>
</body>
</html>
