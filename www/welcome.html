<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuDherapy | Welcome</title>
    <style>
        body { 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        .welcome-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* Dashboard-Style Title with Paw Prints */
        .dash-title { 
            color: #FFD700; 
            margin-top: 0; 
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .paw {
            font-size: 22px;
            filter: grayscale(100%) brightness(150%); /* Makes them a soft, low-light silver */
        }

        p { color: #aaa; font-size: 14px; margin-bottom: 25px; line-height: 1.4; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        input[type="text"], select {
            width: 100%;
            background: #222;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input[type="text"]:focus, select:focus {
            border-color: #FFD700; /* Highlights gold when typing */
        }
        
        .date-row { display: flex; gap: 10px; }
        .date-row select { flex: 1; }

        .btn-enter {
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-enter:active { background: #357ABD; }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1 class="dash-title">
            <span class="paw">🐾</span>
            AuDherapy
            <span class="paw">🐾</span>
        </h1>
        <p>Your personal, secure space for tracking and reflection.</p>

        <div class="input-group">
            <label>Preferred Name</label>
            <input type="text" id="userName" placeholder="What should we call you?">
        </div>

        <div class="input-group">
            <label>Birthday (For a yearly celebration)</label>
            <div class="date-row">
                <select id="birthMonth">
                    <option value="" disabled selected>Month</option>
                    <option value="01">Jan</option><option value="02">Feb</option>
                    <option value="03">Mar</option><option value="04">Apr</option>
                    <option value="05">May</option><option value="06">Jun</option>
                    <option value="07">Jul</option><option value="08">Aug</option>
                    <option value="09">Sep</option><option value="10">Oct</option>
                    <option value="11">Nov</option><option value="12">Dec</option>
                </select>
                <select id="birthDay">
                    <option value="" disabled selected>Day</option>
                    </select>
            </div>
        </div>

        <button class="btn-enter" onclick="saveProfile()">ENTER</button>
    </div>

    <script>
        const daySelect = document.getElementById('birthDay');
        for (let i = 1; i <= 31; i++) {
            let option = document.createElement('option');
            let val = i < 10 ? '0' + i : i; 
            option.value = val;
            option.text = val;
            daySelect.appendChild(option);
        }

        function saveProfile() {
            const name = document.getElementById('userName').value.trim();
            const month = document.getElementById('birthMonth').value;
            const day = document.getElementById('birthDay').value;

            if (!name || !month || !day) {
                alert("Please fill out all fields.");
                return;
            }

            const userProfile = {
                name: name,
                birthday: `${month}-${day}`, 
                setupDate: new Date().toISOString()
            };
            
            localStorage.setItem('audherapy_profile', JSON.stringify(userProfile));
            
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
