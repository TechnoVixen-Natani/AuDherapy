<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuDherapy | System State</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../js/brain.js"></script>
    <style>
        /* DYNAMIC GRID SCALING */
        #stateGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* If the last button is an odd number, it spans both columns to fill the gap */
        .state-btn-container:last-child:nth-child(odd) {
            grid-column: span 2;
        }

        .state-btn-container {
            position: relative;
        }

        .state-btn {
            width: 100%;
            padding: 25px 10px;
            border: none;
            border-radius: 12px;
            font-size: 20px; /* High-Visibility Requirement */
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* Hover Tooltip (Info Tag) */
        .info-tag {
            visibility: hidden;
            width: 180px;
            background-color: #222;
            color: #fff;
            text-align: center;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            position: absolute;
            z-index: 10;
            bottom: 110%;
            left: 50%;
            margin-left: -90px;
            font-size: 13px;
            font-weight: normal;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .state-btn-container:hover .info-tag {
            visibility: visible;
            opacity: 1;
        }

        /* Delete Button (Small 'X') */
        .del-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            display: none; /* Hidden by default */
            z-index: 5;
        }

        .editing .del-btn { display: block; }

        /* Management Card */
        .manage-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            border: 1px dashed #444;
        }
    </style>
</head>
<body onload="checkAuth(); renderStates();">

    <div class="app-container">
        <h1 style="font-size: 34px; text-align: center; margin-bottom: 25px;">⚡ System State</h1>

        <div id="stateGrid"></div>

        <div class="manage-card">
            <h3 style="margin-top: 0; color: var(--text-muted);">Manage Buttons</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button onclick="toggleEdit()" id="editToggleBtn" style="flex:1; padding:10px; background:#444; color:white; border:none; border-radius:8px;">✎ EDIT / REMOVE</button>
            </div>
            
            <div id="addForm" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="newName" placeholder="State Name (e.g. Focused)" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
                <input type="text" id="newInfo" placeholder="Description (Hover Text)" style="padding:12px; border-radius:8px; border:1px solid #333; background:#111; color:white;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-size:12px;">Color:</label>
                    <input type="color" id="newColor" value="#3498db" style="height:40px; border:none; background:none; flex:1;">
                    <button onclick="addNewState()" style="padding:12px 20px; background:var(--text-green); color:black; font-weight:bold; border:none; border-radius:8px;">+ ADD</button>
                </div>
            </div>
        </div>

        <button onclick="window.location.href='../dashboard.html'" 
                style="width:100%; margin-top:30px; padding: 20px; border-radius: 12px; font-weight: bold; font-size: 20px; background:transparent; border:1px solid #444; color:#888;">
            🔙 BACK TO DASHBOARD
        </button>
    </div>

    <script>
        // 1. Initial State Data (Default List)
        const defaults = [
            { label: "Flow State", color: "#2ecc71", info: "High productivity, deep focus, and high regulation." },
            { label: "Neutral", color: "#95a5a6", info: "Standard operating state. Balanced input/output." },
            { label: "Calm", color: "#3498db", info: "Low arousal, relaxed, and peaceful state." },
            { label: "Inner Unrest", color: "#f1c40f", info: "Subtle agitation. Pre-crisis warning." },
            { label: "Hyper-Arousal", color: "#e67e22", info: "Overstimulated, anxious, or 'fight/flight' mode." },
            { label: "Hypo-Arousal", color: "#9b59b6", info: "Shutdown, numbness, or 'freeze' response." }
        ];

        // Load from LocalStorage or use defaults
        let states = JSON.parse(localStorage.getItem('customStates')) || defaults;
        let isEditing = false;

        function renderStates() {
            const grid = document.getElementById('stateGrid');
            grid.className = isEditing ? 'editing' : '';
            
            grid.innerHTML = states.map((state, index) => `
                <div class="state-btn-container">
                    <span class="info-tag">${state.info}</span>
                    <button class="del-btn" onclick="removeState(${index})">✕</button>
                    <button class="state-btn" 
                            style="background-color: ${state.color}; color: ${getContrastColor(state.color)};"
                            onclick="if(!isEditing) logSystemState('${state.label}', '${state.color}')">
                        ${state.label}
                    </button>
                </div>
            `).join('');
        }

        function addNewState() {
            const name = document.getElementById('newName').value;
            const info = document.getElementById('newInfo').value;
            const color = document.getElementById('newColor').value;

            if (!name) return alert("Please enter a name.");

            states.push({ label: name, info: info || "No description provided.", color: color });
            saveAndRender();
            
            // Clear form
            document.getElementById('newName').value = '';
            document.getElementById('newInfo').value = '';
        }

        function removeState(index) {
            if (confirm(`Remove "${states[index].label}"?`)) {
                states.splice(index, 1);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('customStates', JSON.stringify(states));
            renderStates();
        }

        function toggleEdit() {
            isEditing = !isEditing;
            document.getElementById('editToggleBtn').innerText = isEditing ? "✔ FINISH EDITING" : "✎ EDIT / REMOVE";
            document.getElementById('editToggleBtn').style.background = isEditing ? "var(--text-green)" : "#444";
            document.getElementById('editToggleBtn').style.color = isEditing ? "black" : "white";
            renderStates();
        }

        function getContrastColor(hex) {
            const r = parseInt(hex.substr(1,2), 16);
            const g = parseInt(hex.substr(3,2), 16);
            const b = parseInt(hex.substr(5,2), 16);
            const yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        function logSystemState(label, color) {
    // THE FIX: We change the 3rd item to '1' so the analytics can count it as 1 entry
    window.log('SystemState', label, 1, color); 
    alert(`🐾🐾 SUCCESS 🐾🐾\nState Logged: ${label}`);
}

        function checkAuth() {
            if (sessionStorage.getItem('aud_auth') !== 'true') window.location.href = '../index.html';
        }
    </script>
</body>
</html>
