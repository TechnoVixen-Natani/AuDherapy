<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuDherapy | Daily Functioning</title>
    <link rel="stylesheet" href="style.css">
    <script src="../js/brain.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
        
        .card { 
            background: #111; 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            border-left: 8px solid transparent; 
        }

        /* High Visibility Sliders */
        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 25px;
            background: #222;
            outline: none;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 35px;
            height: 45px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        /* Specific Slider Thumb Colors */
        #painSlider::-webkit-slider-thumb { background: #ef4444; }
        #energySlider::-webkit-slider-thumb { background: #3b82f6; }

        .value-display {
            font-size: 42px;
            font-weight: bold;
            margin: 10px 0 20px 0;
        }

        /* Text Input Boxes */
        .desc-box {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            resize: vertical;
            min-height: 80px;
        }
        .desc-box::placeholder { color: #888; }

        .log-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
    </style>
</head>
<body onload="checkAuth();">

    <div class="app-container">
        <h1 style="font-size: 42px; margin-bottom: 30px;">⚡ Daily Functioning</h1>

        <div class="card" style="border-left-color: #ef4444;">
            <h2 style="color: #ef4444; font-size: 28px; margin-top: 0;">Pain Level (0-10)</h2>
            <p style="color: #888; font-size: 14px; margin-bottom: 20px;">0 = No Pain | 10 = Worst Possible Pain</p>
            
            <input type="range" min="0" max="10" value="0" class="slider" id="painSlider">
            <div class="value-display" id="painDisplay" style="color: #ef4444;">0</div>
            
            <textarea id="painDesc" class="desc-box" placeholder="Describe what/where the pain is..."></textarea>
            
            <button class="log-btn" style="background: #ef4444;" onclick="logPain()">LOG PAIN LEVEL</button>
        </div>

        <div class="card" style="border-left-color: #3b82f6;">
            <h2 style="color: #3b82f6; font-size: 28px; margin-top: 0;">Spoon / Battery Capacity</h2>
            <p style="color: #888; font-size: 14px; margin-bottom: 20px;">0% = Empty | 100% = Fully Charged</p>
            
            <input type="range" min="0" max="100" value="100" class="slider" id="energySlider">
            <div class="value-display" id="energyDisplay" style="color: #3b82f6;">100%</div>
            
            <textarea id="energyDesc" class="desc-box" placeholder="Describe your current energy level..."></textarea>
            
            <button class="log-btn" style="background: #3b82f6;" onclick="logEnergy()">LOG ENERGY LEVEL</button>
        </div>

        <button onclick="window.location.href='../dashboard.html'" 
                style="width: 100%; padding: 20px; background: transparent; border: 1px solid #444; color: #888; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer;">
            🏠 BACK TO DASHBOARD
        </button>
    </div>

    <script>
        // Real-time slider updates
        const painSlider = document.getElementById('painSlider');
        const painDisplay = document.getElementById('painDisplay');
        painSlider.oninput = function() { painDisplay.innerHTML = this.value; }

        const energySlider = document.getElementById('energySlider');
        const energyDisplay = document.getElementById('energyDisplay');
        energySlider.oninput = function() { energyDisplay.innerHTML = this.value + "%"; }

        // Forensic Logging Functions
        function logPain() {
            const val = painSlider.value;
            const desc = document.getElementById('painDesc').value || "No description provided.";
            
            if (typeof window.log === 'function') {
                // Logs as category: DailyFunction, item: Pain, value: number, note: description
                window.log('DailyFunction', 'Pain', Number(val), desc);
                alert(`🐾🐾 SUCCESS 🐾🐾\nPain Level (${val}) logged successfully.`);
                document.getElementById('painDesc').value = ''; // Clear text box after logging
            } else {
                alert("Error: brain.js not found.");
            }
        }

        function logEnergy() {
            const val = energySlider.value;
            const desc = document.getElementById('energyDesc').value || "No description provided.";
            
            if (typeof window.log === 'function') {
                // Logs as category: DailyFunction, item: Energy, value: number, note: description
                window.log('DailyFunction', 'Energy', Number(val), desc);
                alert(`🐾🐾 SUCCESS 🐾🐾\nEnergy Level (${val}%) logged successfully.`);
                document.getElementById('energyDesc').value = ''; // Clear text box after logging
            } else {
                alert("Error: brain.js not found.");
            }
        }

        // Security Check
        function checkAuth() { 
            if (sessionStorage.getItem('aud_auth') !== 'true') window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
