<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuDherapy | Maintenance</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../js/brain.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
        
        /* Universal Card Style with Forensic Accent */
        .card { 
            background: #111; 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            border-left: 8px solid var(--night-blue); 
            text-align: left;
        }

        /* High-Visibility Readable Buttons */
        .action-btn {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 900; /* Max boldness for readability */
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Standardized Back Button */
        .back-btn {
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 1px solid #444;
            color: #888;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .input-box {
            width: 100%;
            padding: 20px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 12px;
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body onload="checkAuth(); renderMaintenance();">

    <div class="app-container">
        <h1 style="font-size: 42px; margin-bottom: 30px;">💧 Maintenance</h1>

        <div class="card">
            <h2 style="font-size: 28px; margin: 0 0 10px 0; color: var(--night-blue);">Hydration Station</h2>
            <p id="waterDisplay" style="font-size: 22px; font-weight: 900; margin-bottom: 20px; color: #888;">PROGRESS: 0 / 64 oz</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button onclick="addWater(8)" class="action-btn" style="background: var(--night-blue); color: white;">+ 8oz Cup</button>
                <button onclick="addWater(16)" class="action-btn" style="background: var(--night-blue); color: white;">+ 16oz Bottle</button>
            </div>
        </div>

        <div class="card" style="border-left-color: var(--morning-gold);">
            <h2 style="font-size: 28px; margin: 0 0 15px 0; color: var(--morning-gold);">Oral Hygiene</h2>
            <button onclick="logTeeth()" class="action-btn" style="background: var(--morning-gold); color: black;">🪥 LOG TEETH BRUSHING</button>
        </div>

        <div class="card" style="border-left-color: #3b82f6;">
            <h2 style="font-size: 28px; margin: 0 0 15px 0; color: #3b82f6;">Body Weight</h2>
            <input type="number" id="weightInput" class="input-box" placeholder="LBS">
            <button onclick="logWeight()" class="action-btn" style="background: #3b82f6; color: white;">⚖️ LOG WEIGHT</button>
        </div>

        <button onclick="window.location.href='../dashboard.html'" class="back-btn">🏠 BACK TO DASHBOARD</button>
    </div>

    <script>
    function getTodayWater() {
        const vault = JSON.parse(localStorage.getItem('audherapy_db') || '[]');
        const today = new Date().toDateString();
        let total = 0;
        vault.forEach(log => {
            if (log.category === 'Maintenance' && log.item === 'Water Intake') {
                if (new Date(log.timestamp).toDateString() === today) {
                    total += log.value;
                }
            }
        });
        return total;
    }

    function addWater(amount) {
        if (typeof window.log === 'function') {
            window.log('Maintenance', 'Water Intake', amount, `Added ${amount}oz`);
            setTimeout(() => {
                renderMaintenance();
                const newTotal = getTodayWater();
                if (newTotal >= 64 && (newTotal - amount) < 64) {
                    alert("🐾🐾 SUCCESS 🐾🐾\nHydration Goal Reached.");
                }
            }, 100);
        }
    }

    function logTeeth() {
        if (typeof window.log === 'function') {
            window.log('Maintenance', 'Teeth Brushing', 1, "Oral hygiene completed");
            alert("🐾🐾 SUCCESS 🐾🐾\nTeeth brushing logged.");
        }
    }

    function logWeight() {
        const val = document.getElementById('weightInput').value;
        if (!val || typeof window.log !== 'function') return;
        window.log('Maintenance', 'Weight', parseFloat(val), `${val} lbs logged`);
        document.getElementById('weightInput').value = '';
        alert("🐾🐾 SUCCESS 🐾🐾\nWeight logged.");
    }

    function renderMaintenance() {
        const currentWater = getTodayWater();
        const display = document.getElementById('waterDisplay');
        if (display) display.innerText = `PROGRESS: ${currentWater} / 64 oz`;
    }

    function checkAuth() {
        if (sessionStorage.getItem('aud_auth') !== 'true') window.location.href = '../index.html';
    }
    </script>
</body>
</html>
